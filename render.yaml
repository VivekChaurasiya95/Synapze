services:
  - type: web
    name: Synapze-backend
    runtime: node
    buildCommand: npm install; npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://synapze.vercel.app
